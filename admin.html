<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Chỉnh nội dung landing page</title>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{--orange:#E8510A;--green:#1A7D3C;--dark:#111827;--text:#374151;--muted:#6b7280;--line:#e5e7eb;--bg:#f4f4f6;--white:#fff}
body{margin:0;font-family:Arial,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.app-shell{min-height:100vh;display:grid;grid-template-columns:300px 1fr}
.sidebar{position:sticky;top:0;height:100vh;background:#030303;color:#fff;padding:28px 28px;display:flex;flex-direction:column}
.sidebar-brand{font-size:26px;font-weight:900;letter-spacing:.5px;margin-bottom:28px}
.sidebar-nav{display:grid;gap:10px}
.nav-item{width:100%;justify-content:flex-start;background:transparent;color:#d1d5db;border-radius:8px;padding:14px 16px;font-size:16px;min-height:52px}
.nav-item:hover{background:#111;color:#fff}
.nav-item.active{background:#181818;color:#fff}
.sidebar-bottom{margin-top:auto;display:grid;gap:10px}
.sidebar-bottom .primary{background:#fff;color:#050505}
.sidebar-bottom .secondary{background:#fff;color:#050505;border-color:#fff}
.content{min-width:0;padding:36px 34px 48px}
.topbar{margin-bottom:24px}
.topbar-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:24px}
.brand small{display:block;color:var(--muted);font-weight:900;text-transform:uppercase;font-size:13px;margin-bottom:2px}
.brand strong{display:block;color:#050505;font-size:34px;line-height:1.1}
.brand span{display:block;color:var(--muted);font-size:14px;margin-top:8px}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
button,.link-btn{border:0;border-radius:999px;padding:11px 18px;font-weight:800;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:44px}
.primary{background:#050505;color:#fff}
.secondary{background:#fff;color:#111;border:1px solid var(--line)}
.ghost{background:#fff;color:var(--dark);border:1px solid var(--line)}
.danger{background:#fff;color:#b42318;border:1px solid #ffd0d0}
.wrap{max-width:1050px;margin:0;padding:0}
.notice{background:#fff;border:1px solid var(--line);padding:14px 16px;border-radius:8px;margin-bottom:18px;color:#374151;font-size:14px}
.grid{display:grid;grid-template-columns:1fr;gap:14px;align-items:start}
.card{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.card-head{padding:14px 16px;background:#fbfbfa;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-head h2{margin:0;font-size:16px;color:var(--dark)}
.card-head small{color:var(--muted);font-weight:700}
.card-body{padding:16px;display:grid;gap:12px}
label{display:block;font-weight:700;color:var(--dark);font-size:13px;margin-bottom:6px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font:inherit;color:var(--dark);background:#fff;outline:none}
textarea{min-height:78px;resize:vertical}
input:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,125,60,.12)}
.preview{display:flex;gap:12px;align-items:center;background:#f9fafb;border:1px solid var(--line);border-radius:8px;padding:10px}
.preview-img{width:96px;height:64px;object-fit:cover;border-radius:6px;background:#e5e7eb;flex:0 0 auto}
.preview-text{font-size:12px;color:var(--muted);word-break:break-all}
.empty{color:#9ca3af}
.status{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:12px 14px;border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.2);font-size:13px;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}
.status.show{opacity:1;transform:translateY(0)}
iframe{position:absolute;width:1px;height:1px;left:-9999px;border:0;opacity:0}
@media(max-width:820px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;padding:20px}
  .sidebar-nav{grid-template-columns:repeat(2,minmax(0,1fr))}
  .content{padding:22px 14px 38px}
  .topbar-inner{align-items:flex-start;flex-direction:column}
  .actions{justify-content:flex-start}
  .brand strong{font-size:28px}
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">TOUR ADMIN</div>
    <nav class="sidebar-nav" id="sectionNav" aria-label="Danh sách section"></nav>
    <div class="sidebar-bottom">
      <button class="primary" id="saveBtn">Lưu thay đổi</button>
      <a class="link-btn secondary" href="index.html" target="_blank" rel="noopener">Xem landing page</a>
    </div>
  </aside>

  <div class="content">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <small>Dashboard</small>
          <strong id="sectionTitle">Hero chính</strong>
          <span>Sửa tiêu đề và hình ảnh của section đang chọn</span>
        </div>
        <div class="actions">
          <button class="ghost" id="reloadBtn">Tải lại dữ liệu</button>
          <button class="danger" id="resetBtn">Xóa cấu hình đã lưu</button>
        </div>
      </div>
    </div>

    <main class="wrap">
      <div class="notice">
        Chọn section bên trái, sửa nội dung, bấm <strong>Lưu thay đổi</strong>. Trang <strong>index.html</strong> sẽ đổi khi mở cùng domain với admin, ví dụ cùng chạy trên GitHub Pages.
      </div>
      <div class="grid" id="editorGrid"></div>
    </main>
  </div>
</div>

<iframe src="index.html" id="landingFrame" title="Landing page source"></iframe>
<div class="status" id="status">Đã lưu</div>

<script>

  for(var p=1;p<=5;p++)text("overviewPill"+p,"Tổng quan","Tag thông tin "+p,"#overview .pill:nth-child("+p+")",true);

  text("highlightsLabel","Điểm nổi bật","Nhãn section","#highlights .sec-label",true);
  text("highlightsSub","Điểm nổi bật","Mô tả section","#highlights .sec-sub",true);
  for(var h=1;h<=4;h++){
    text("highlight"+h+"Tag","Điểm nổi bật","Tag card "+h,"#highlights .hl-card:nth-child("+h+") .hl-tag",true);
    text("highlight"+h+"Desc","Điểm nổi bật","Mô tả card "+h,"#highlights .hl-card:nth-child("+h+") p",true);

    for(var m=1;m<=3;m++)text("itinerary"+d+"Meal"+m,"Lịch trình","Bữa ăn ngày "+d+"."+m,"#itinerary .tl-item:nth-child("+d+") .meal:nth-child("+m+")",true);
    for(var li=1;li<=dayLiCounts[d-1];li++)text("itinerary"+d+"Act"+li,"Lịch trình","Hoạt động ngày "+d+"."+li,"#itinerary .tl-item:nth-child("+d+") .acts li:nth-child("+li+")",true);

var sectionLabels=[
  "1. Hero chính",
  "2. Section 2",
  "3. Giá",
  "4. Điểm nổi bật",
  "5. Hình ảnh",
  "6. Lịch trình",
  "7. Dịch vụ",
  "8. Chính sách",
  "9. Đánh giá",
  "10. Booking"
];
var sectionOrder=["Hero","Tổng quan","Giá tour","Điểm nổi bật","Gallery","Lịch trình","Dịch vụ","Chính sách","Đánh giá","Booking"];
var activeGroup=null;
var draftData={};

function getSections(){
  var seen={};
  var groups=fields.map(function(field){return field.group}).filter(function(group){
    if(seen[group])return false;
    seen[group]=true;
    return true;
  });
  return sectionOrder.filter(function(group){return groups.indexOf(group)>-1});
}

function getSectionLabel(group){
  var index=getSections().indexOf(group);
  return sectionLabels[index]||group;
}

function renderSidebar(){
  var nav=document.getElementById("sectionNav");
  nav.innerHTML="";
  getSections().forEach(function(group){
    var btn=document.createElement("button");
    btn.type="button";
    btn.className="nav-item"+(group===activeGroup?" active":"");
    btn.textContent=getSectionLabel(group);
    btn.addEventListener("click",function(){
      collectVisibleData();
      activeGroup=group;
      renderEditor();
    });
    nav.appendChild(btn);
  });
}

function readSaved(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")}catch(e){return{}}
}

function getBackgroundUrl(el){
  var bg=(el.style.backgroundImage||getComputedStyle(el).backgroundImage||"").trim();
  var match=bg.match(/^url\(["']?(.*?)["']?\)$/);
  return match?match[1]:"";
}

function getDefaults(){
  var frame=document.getElementById("landingFrame");
  if(!frame||!frame.contentDocument)return {};
  var doc=frame.contentDocument;
  var defaults={};
  fields.forEach(function(field){
    var item={};
    if(field.titleSelector){
      var titleEl=doc.querySelector(field.titleSelector);
      if(titleEl)item.title=(field.html?titleEl.innerHTML:titleEl.textContent).trim();
    }
    if(field.imageSelector){
      var imageEl=doc.querySelector(field.imageSelector);
      if(imageEl)item.image=field.imageType==="background"?getBackgroundUrl(imageEl):imageEl.getAttribute("src")||"";
    }
    defaults[field.key]=item;
  });
  return defaults;
}

function mergeData(defaults,saved){
  var data={};
  fields.forEach(function(field){
    data[field.key]=Object.assign({},defaults[field.key]||{},saved[field.key]||{});
  });
  return data;
}

function makeCard(field,data){
  var card=document.createElement("section");
  card.className="card";
  card.dataset.key=field.key;
  card.innerHTML=
    '<div class="card-head"><h2>'+field.label+'</h2><small>'+field.group+'</small></div>'+
    '<div class="card-body"></div>';
  var body=card.querySelector(".card-body");

  if(field.titleSelector){
    var titleWrap=document.createElement("div");
    titleWrap.innerHTML='<label>'+(field.textLabel||"Nội dung")+'</label><textarea data-field="title" placeholder="Nhập nội dung">'+escapeHtml(data.title||"")+'</textarea>';
    body.appendChild(titleWrap);
  }

  if(field.imageSelector){
    var imageWrap=document.createElement("div");
    imageWrap.innerHTML='<label>URL hình ảnh</label><input data-field="image" type="url" placeholder="https://..." value="'+escapeAttr(data.image||"")+'">';
    body.appendChild(imageWrap);

    var preview=document.createElement("div");
    preview.className="preview";
    preview.innerHTML='<img class="preview-img" alt=""><div class="preview-text"></div>';
    body.appendChild(preview);
  }
  return card;
}

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g,function(ch){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch];
  });
}

function escapeAttr(text){
  return escapeHtml(text).replace(/`/g,"&#96;");
}

function updatePreviews(){
  document.querySelectorAll(".card").forEach(function(card){
    var input=card.querySelector('[data-field="image"]');
    var preview=card.querySelector(".preview");
    if(!input||!preview)return;
    var img=preview.querySelector(".preview-img");
    var text=preview.querySelector(".preview-text");
    var url=input.value.trim();
    img.src=url||"";
    text.textContent=url||"Chưa có URL ảnh";
    text.className=url?"preview-text":"preview-text empty";
  });
}

function renderEditor(){
  if(!activeGroup)activeGroup=getSections()[0];
  var defaults={};
  try{defaults=getDefaults()}catch(e){defaults={}}
  var data=mergeData(defaults,Object.assign({},readSaved(),draftData));
  var grid=document.getElementById("editorGrid");
  grid.innerHTML="";
  fields.forEach(function(field){
    if(field.group!==activeGroup)return;
    grid.appendChild(makeCard(field,data[field.key]||{}));
  });
  document.getElementById("sectionTitle").textContent=getSectionLabel(activeGroup);
  renderSidebar();
  updatePreviews();
}

function collectVisibleData(){
  var data=Object.assign({},draftData);
  document.querySelectorAll(".card").forEach(function(card){
    var key=card.dataset.key;
    data[key]={};
    card.querySelectorAll("[data-field]").forEach(function(input){
      data[key][input.dataset.field]=input.value.trim();
    });
  });
  draftData=data;
  return data;
}

function collectData(){
  return Object.assign({},readSaved(),collectVisibleData());
}

function showStatus(text){
  var status=document.getElementById("status");
  status.textContent=text;
  status.classList.add("show");
  setTimeout(function(){status.classList.remove("show")},1800);
}

renderEditor();
document.getElementById("landingFrame").addEventListener("load",renderEditor);
document.getElementById("saveBtn").addEventListener("click",function(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(collectData()));
  localStorage.setItem(STORAGE_KEY+":updated",String(Date.now()));
  draftData=readSaved();
  showStatus("Đã lưu thay đổi");
});
document.getElementById("reloadBtn").addEventListener("click",function(){
  document.getElementById("landingFrame").contentWindow.location.reload();
});
document.getElementById("resetBtn").addEventListener("click",function(){
  if(!confirm("Xóa toàn bộ cấu hình đã lưu? Landing page sẽ quay về nội dung mặc định."))return;
  localStorage.removeItem(STORAGE_KEY);
  draftData={};
  document.getElementById("landingFrame").contentWindow.location.reload();
  showStatus("Đã xóa cấu hình");
});
document.addEventListener("input",function(e){
  if(e.target.matches('[data-field="image"]'))updatePreviews();
});
</script>
</body>
</html>
